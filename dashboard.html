<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404Plyh — Recon Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--bg1:#111111;--bg2:#1a1a1a;--border:#222222;--border-h:#333333;
  --fg:#e0e0e0;--fg2:#aaaaaa;--fg3:#666666;--fg4:#444444;
  --accent:#f59e0b;--red:#ef4444;--grn:#22c55e;--blu:#60a5fa;
  --fm:'JetBrains Mono',monospace;--r:2px;--tr:0.15s ease
}
body{font-family:var(--fm);background:var(--bg);color:var(--fg);line-height:1.6;min-height:100vh;font-size:13px}
.container{max-width:1400px;margin:0 auto;padding:0 1.5rem}
.hide{display:none!important}

/* ── Header ── */
.header{padding:1.25rem 0;border-bottom:1px solid var(--border);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.logo{font-size:14px;font-weight:700;color:var(--fg);letter-spacing:-.02em}
.logo span{color:var(--fg3);font-weight:400}
.header-actions{display:flex;gap:.5rem;align-items:center}
.btn{background:var(--bg2);border:1px solid var(--border);color:var(--fg2);padding:6px 14px;border-radius:var(--r);font-size:12px;font-family:var(--fm);cursor:pointer;transition:var(--tr);text-transform:lowercase}
.btn:hover{border-color:var(--border-h);color:var(--fg)}
.btn-primary{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.btn-primary:hover{background:#ffffff}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:var(--bg)}
.btn-sm{padding:4px 10px;font-size:11px}
.back-btn{cursor:pointer;color:var(--fg3);font-size:12px;background:none;border:none;font-family:var(--fm);transition:var(--tr)}
.back-btn:hover{color:var(--fg)}
.meta{display:flex;gap:1.5rem;flex-wrap:wrap;font-size:12px}
.meta-item{display:flex;gap:.35rem}
.meta-label{color:var(--fg3)}
.meta-val{color:var(--fg);font-weight:500}

/* ── Explorer ── */
.search-bar{position:relative;margin-bottom:1.25rem}
.search-bar input{width:100%;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px 10px 32px;color:var(--fg);font-size:13px;font-family:var(--fm);outline:none;transition:var(--tr)}
.search-bar input:focus{border-color:var(--fg3)}
.search-bar input::placeholder{color:var(--fg4)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--fg4);font-size:13px;pointer-events:none}
.search-count{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--fg3)}

.target-list{display:flex;flex-direction:column;gap:1px}
.target-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:1rem;padding:12px 16px;background:var(--bg1);cursor:pointer;transition:var(--tr);border-left:2px solid transparent}
.target-row:hover{background:var(--bg2);border-left-color:var(--fg3)}
.target-row:first-child{border-radius:var(--r) var(--r) 0 0}
.target-row:last-child{border-radius:0 0 var(--r) var(--r)}
.tr-left{display:flex;align-items:baseline;gap:1rem;min-width:0}
.tr-domain{font-weight:600;font-size:14px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-stats{display:flex;gap:1rem;font-size:11px;color:var(--fg3);flex-shrink:0;white-space:nowrap}
.tr-stats span b{color:var(--fg2);margin-right:2px}
.tr-right{display:flex;align-items:center;gap:.75rem;flex-shrink:0}
.tr-date{font-size:11px;color:var(--fg4)}
.monitor-sw{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--fg4);text-transform:uppercase;letter-spacing:.04em}
.toggle-sw{position:relative;display:inline-block;width:28px;height:16px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:8px;transition:var(--tr)}
.toggle-slider::before{content:'';position:absolute;width:12px;height:12px;left:2px;bottom:2px;background:var(--fg4);border-radius:50%;transition:var(--tr)}
.toggle-sw input:checked+.toggle-slider{background:var(--grn)}
.toggle-sw input:checked+.toggle-slider::before{transform:translateX(12px);background:var(--fg)}

.empty-state{text-align:center;padding:4rem 1rem;color:var(--fg4)}
.empty-state p{margin-top:.5rem;font-size:12px}

/* ── Scan status bar ── */
.scan-status-bar{display:none;align-items:center;gap:.6rem;padding:8px 14px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1rem;font-size:12px}
.scan-status-bar.visible{display:flex}
.scan-status-bar .spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--fg);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}

/* ── Nav bar ── */
.nav{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);margin-bottom:1.25rem;scrollbar-width:none}
.nav::-webkit-scrollbar{height:0}
.nav-btn{background:none;border:none;padding:8px 16px;color:var(--fg3);font-size:12px;font-family:var(--fm);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:var(--tr)}
.nav-btn:hover{color:var(--fg2)}
.nav-btn.active{color:var(--fg);border-bottom-color:var(--fg)}
.nav-count{font-size:10px;color:var(--fg4);margin-left:4px}

/* ── Stat summary (inline, not cards) ── */
.stat-bar{display:flex;flex-wrap:wrap;gap:1.5rem;padding:12px 0;margin-bottom:1rem;border-bottom:1px solid var(--border);font-size:12px}
.stat-item{display:flex;align-items:baseline;gap:6px;cursor:pointer;transition:var(--tr)}
.stat-item:hover{color:var(--fg)}
.stat-item .stat-val{font-size:18px;font-weight:700;color:var(--fg)}
.stat-item .stat-label{color:var(--fg3);text-transform:lowercase}

/* ── Sections ── */
.section{margin-bottom:2px;background:var(--bg1);display:none}
.section.visible{display:block}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;transition:var(--tr);border-bottom:1px solid transparent}
.section-head:hover{background:var(--bg2)}
.section.open .section-head{border-bottom-color:var(--border)}
.section-title{font-weight:600;font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.06em}
.sec-badge{color:var(--fg4);font-size:11px;margin-left:8px;font-weight:400}
.sec-chevron{color:var(--fg4);font-size:11px;transition:transform .2s ease}
.section.open .sec-chevron{transform:rotate(180deg)}
.section-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.section.open .section-body{max-height:100000px}
.section-inner{padding:16px}

/* ── Tabs within sections ── */
.sec-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;scrollbar-width:none}
.sec-tabs::-webkit-scrollbar{height:0}
.sec-tab{background:none;border:none;padding:8px 12px;color:var(--fg4);font-size:11px;font-family:var(--fm);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:var(--tr)}
.sec-tab:hover{color:var(--fg2)}
.sec-tab.active{color:var(--fg);border-bottom-color:var(--fg)}
.sec-tab-count{color:var(--fg4);margin-left:4px}
.tab-pane{display:none}.tab-pane.active{display:block}

/* ── Filter inputs ── */
.sec-filter{margin-bottom:10px}
.sec-filter input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;color:var(--fg);font-size:12px;font-family:var(--fm);outline:none;transition:var(--tr)}
.sec-filter input:focus{border-color:var(--fg3)}
.sec-filter input::placeholder{color:var(--fg4)}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;max-height:600px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)}
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:auto}
.tbl thead{position:sticky;top:0;z-index:2}
.tbl th{background:var(--bg2);color:var(--fg3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:6px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--fg2);white-space:nowrap}
.tbl td.url-cell{max-width:600px;overflow:hidden;text-overflow:ellipsis;position:relative}
.tbl td.url-cell:hover{overflow:visible;white-space:normal;word-break:break-all;background:var(--bg2);z-index:1}
.tbl tbody tr{transition:background .1s}
.tbl tbody tr:nth-child(even){background:rgba(255,255,255,.015)}
.tbl tbody tr:hover{background:var(--bg2)}
.hl{background:rgba(245,158,11,.15);color:var(--accent);padding:0 1px;border-radius:1px}
.badge{display:inline-block;padding:2px 8px;border-radius:var(--r);font-size:11px;font-weight:600}
.b-2xx{background:rgba(34,197,94,.1);color:var(--grn)}
.b-3xx{background:rgba(96,165,250,.1);color:var(--blu)}
.b-4xx{background:rgba(245,158,11,.1);color:var(--accent)}
.b-5xx{background:rgba(239,68,68,.1);color:var(--red)}
.b-na{color:var(--fg4)}

/* ── Raw output ── */
.raw-output{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;font-size:11px;color:var(--fg3);line-height:1.6;white-space:pre;overflow-x:auto;max-height:600px;overflow-y:auto}

/* ── Screenshots ── */
.ss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.ss-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:var(--tr)}
.ss-card:hover{border-color:var(--fg4)}
.ss-card img{width:100%;height:180px;object-fit:cover;display:block}
.ss-name{padding:6px 10px;font-size:11px;color:var(--fg3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-top:1px solid var(--border)}

/* ── Lightbox ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;justify-content:center;align-items:center;cursor:pointer}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:var(--r)}
.lb-label{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg1);border:1px solid var(--border);padding:6px 16px;border-radius:var(--r);font-size:12px;color:var(--fg)}

/* ── Infra cards ── */
.infra-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.infra-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px}
.infra-ip{font-weight:600;color:var(--fg);font-size:13px;margin-bottom:4px}
.infra-org{color:var(--fg3);font-size:11px;margin-bottom:6px}
.infra-hosts{display:flex;flex-wrap:wrap;gap:4px}
.infra-tag{background:var(--bg2);color:var(--fg3);font-size:10px;padding:2px 8px;border-radius:var(--r)}

/* ── Pagination ── */
.paging{display:flex;align-items:center;justify-content:space-between;padding:8px 0 0;border-top:1px solid var(--border);margin-top:8px}
.paging-info{font-size:11px;color:var(--fg4)}
.paging-btns{display:flex;gap:3px}
.pg-btn{background:var(--bg);border:1px solid var(--border);color:var(--fg3);padding:4px 10px;border-radius:var(--r);font-size:11px;cursor:pointer;transition:var(--tr);font-family:var(--fm)}
.pg-btn:hover:not(:disabled){border-color:var(--fg3);color:var(--fg)}
.pg-btn:disabled{opacity:.25;cursor:not-allowed}
.pg-btn.active{background:var(--fg);color:var(--bg);border-color:var(--fg)}

/* ── Monitor ── */
.monitor-timeline{padding:0}
.monitor-entry{padding:10px 16px;border-bottom:1px solid var(--border);transition:var(--tr)}
.monitor-entry:hover{background:var(--bg2)}
.monitor-entry:last-child{border-bottom:none}
.me-time{font-size:11px;color:var(--fg4);margin-bottom:4px}
.me-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.me-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r);font-size:11px;font-weight:600}
.me-badge.add{background:rgba(34,197,94,.1);color:var(--grn)}
.me-badge.rem{background:rgba(239,68,68,.1);color:var(--red)}
.me-badge.neutral{color:var(--fg4)}
.me-details{display:none;margin-top:6px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);font-size:11px;color:var(--fg3);line-height:1.6}
.me-details.open{display:block}
.me-detail-item{padding:1px 0}
.me-detail-item.add{color:var(--grn)}
.me-detail-item.rem{color:var(--red);text-decoration:line-through;opacity:.7}
.me-toggle{background:none;border:none;color:var(--fg4);font-size:11px;font-family:var(--fm);cursor:pointer;padding:0;transition:var(--tr)}
.me-toggle:hover{color:var(--fg)}
.monitor-empty{text-align:center;padding:2rem 1rem;color:var(--fg4);font-size:12px}
.monitor-empty p{margin-top:.5rem;font-size:11px}
.monitor-summary{display:flex;gap:2rem;padding:12px 0;margin-bottom:12px;border-bottom:1px solid var(--border);font-size:12px}
.ms-item .ms-val{font-size:16px;font-weight:700;color:var(--fg)}
.ms-item .ms-label{font-size:10px;color:var(--fg4);text-transform:uppercase;letter-spacing:.04em}
.pulse-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--grn);margin-left:4px;animation:pulse 1.5s ease-in-out infinite}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:900;justify-content:center;align-items:flex-start;padding-top:8vh}
.modal-overlay.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);width:540px;max-width:95vw;max-height:85vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-weight:600;font-size:12px;color:var(--fg);text-transform:uppercase;letter-spacing:.04em}
.modal-close{background:none;border:none;color:var(--fg3);font-size:14px;cursor:pointer;font-family:var(--fm)}
.modal-close:hover{color:var(--fg)}
.modal-body{padding:16px}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:10px;color:var(--fg3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;color:var(--fg);font-size:12px;font-family:var(--fm);outline:none;transition:var(--tr)}
.form-input:focus{border-color:var(--fg3)}
.modules-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.mod-toggle{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:var(--tr);font-size:11px;color:var(--fg3)}
.mod-toggle:hover{border-color:var(--fg4)}
.mod-toggle.active{border-color:var(--grn);color:var(--fg2)}
.mod-toggle .dot{width:6px;height:6px;border-radius:50%;background:var(--fg4);transition:var(--tr);flex-shrink:0}
.mod-toggle.active .dot{background:var(--grn)}
.adv-toggle{font-size:11px;color:var(--fg4);cursor:pointer;background:none;border:none;font-family:var(--fm);margin-bottom:8px;transition:var(--tr)}
.adv-toggle:hover{color:var(--fg2)}
.adv-fields{display:none;gap:8px}.adv-fields.open{display:grid;grid-template-columns:1fr 1fr 1fr}
.modal-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.scan-log{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:11px;color:var(--fg3);max-height:300px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;margin-top:12px;display:none}
.scan-log.visible{display:block}

.empty{text-align:center;padding:2rem 1rem;color:var(--fg4);font-size:12px}
.loading{text-align:center;padding:1.5rem;color:var(--fg4)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--fg3);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:768px){
  .container{padding:0 .6rem}
  .tr-stats{display:none}
  .stat-bar{gap:1rem}
  .stat-item .stat-val{font-size:14px}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--fg4);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--fg3)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="back-btn hide" id="back-btn" onclick="showExplorer()">&lt; back</button>
      <div class="logo">404Plyh<span>::recon</span></div>
    </div>
    <div class="header-actions">
      <div class="meta hide" id="target-meta">
        <div class="meta-item"><span class="meta-label">target</span><span class="meta-val" id="m-domain">--</span></div>
        <div class="meta-item"><span class="meta-label">scanned</span><span class="meta-val" id="m-date">--</span></div>
      </div>
      <button class="btn btn-primary" id="new-scan-btn" onclick="openScanModal()">new scan</button>
      <button class="btn" id="monitor-btn" onclick="runMonitorScan()">monitor</button>
    </div>
  </div>

  <!-- Scan status bar -->
  <div class="scan-status-bar" id="scan-bar">
    <div class="spinner"></div>
    <span id="scan-bar-text">scanning...</span>
    <button class="btn btn-danger btn-sm" onclick="stopScan()">stop</button>
    <button class="btn btn-sm" onclick="openScanLog()">log</button>
  </div>

  <!-- Explorer view -->
  <div id="view-explorer">
    <div class="search-bar"><span class="search-icon">/</span><input type="text" id="explorer-search" placeholder="search targets..." oninput="filterTargets(this.value)"/></div>
    <div id="targets-container"></div>
  </div>

  <!-- Target dashboard view -->
  <div id="view-target" class="hide">
    <div class="search-bar"><span class="search-icon">/</span><input type="text" id="global-search" placeholder="search all data..."/><span class="search-count" id="search-count"></span></div>
    <div class="stat-bar" id="stats-grid"></div>
    <nav class="nav" id="nav-bar"></nav>
    <div id="sections"></div>
  </div>
</div>

<!-- Scan modal -->
<div class="modal-overlay" id="scan-modal">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">new scan</span><button class="modal-close" onclick="closeScanModal()">x</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">target domain</label><input class="form-input" id="scan-domain" placeholder="example.com"/></div>
      <div class="form-group"><label class="form-label">modules</label><div class="modules-grid" id="modules-grid"></div></div>
      <button class="adv-toggle" onclick="document.getElementById('adv-fields').classList.toggle('open')">advanced options ▾</button>
      <div class="adv-fields" id="adv-fields">
        <div class="form-group"><label class="form-label">threads</label><input class="form-input" id="scan-threads" placeholder="15"/></div>
        <div class="form-group"><label class="form-label">rate limit</label><input class="form-input" id="scan-rate" placeholder="150"/></div>
        <div class="form-group"><label class="form-label">top ports</label><input class="form-input" id="scan-ports" placeholder="1000"/></div>
      </div>
      <div class="scan-log" id="scan-log"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeScanModal()">close</button>
      <button class="btn btn-primary" id="start-scan-btn" onclick="startScan()">start scan</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox"><img id="lb-img" src="" alt=""/><div class="lb-label" id="lb-label"></div></div>

<!-- Monitor modal -->
<div class="modal-overlay" id="monitor-modal">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">run monitor</span><button class="modal-close" onclick="closeMonitorModal()">x</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">target domain</label><input class="form-input" id="monitor-domain" placeholder="example.com"/></div>
      <p style="font-size:11px;color:var(--fg4);margin-top:8px">lightweight subdomain + port scan. diffs against baseline.</p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeMonitorModal()">cancel</button>
      <button class="btn btn-primary" onclick="submitMonitorModal()">run</button>
    </div>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
